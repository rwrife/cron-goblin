name: Release

# Cut a release whenever a semver tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# goreleaser then cross-compiles the `goblin` binary, builds archives +
# checksums (see .goreleaser.yaml), and publishes a GitHub Release with notes.
on:
  push:
    tags:
      - "v*"

permissions:
  # goreleaser needs write access to create the release and upload assets.
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so goreleaser can build the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
