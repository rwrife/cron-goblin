# goreleaser config for cron-goblin 👹⏰
#
# Builds the single `goblin` binary for the common desktop/server platforms,
# stamps the release tag into `main.version` (matching the ldflags contract
# documented in cmd/goblin/main.go), and produces archives + a checksums file
# for each tagged release. Driven by .github/workflows/release.yml on `v*` tags.
#
# Sanity-check locally without publishing:
#   goreleaser check
#   goreleaser release --snapshot --clean
version: 2

project_name: cron-goblin

before:
  hooks:
    # Keep modules tidy/verified before a release build.
    - go mod tidy
    - go mod verify

builds:
  - id: goblin
    main: ./cmd/goblin
    binary: goblin
    env:
      - CGO_ENABLED=0
    # Reproducible builds: pin the timestamp to the commit.
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    # Stamp the version into main.version (see cmd/goblin/main.go). The leading
    # `-s -w` strips the symbol table / DWARF for smaller binaries.
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Windows on arm64 is niche and frequently broken in the toolchain; skip it.
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: goblin
    # Tarball everywhere, zip on Windows (what those users expect).
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # e.g. cron-goblin_v1.2.3_linux_amd64.tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - PLAN.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  # Used by `--snapshot` (no tag) builds, e.g. in CI dry-runs.
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  # Mark anything with a pre-release tag (e.g. v0.1.0-rc.1) as a GitHub
  # pre-release automatically; final tags become full releases.
  prerelease: auto
  draft: false
